name: mediscan_ai
description: AI-Powered Clinical Document Scanner & Health Intelligence Portal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5

  # Google Sign-In
  google_sign_in: ^6.3.0

  # HTTP & API
  http: ^1.3.0
  dio: ^5.8.0+1

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Local storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4
  sqflite: ^2.4.1
  path: ^1.9.0

  # UI & Utilities
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1
  intl: ^0.20.2
  uuid: ^4.5.1
  permission_handler: ^11.4.0
  fl_chart: ^0.70.2
  lottie: ^3.3.1
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  image: ^4.3.0
  flutter_animate: ^4.5.2
  provider: ^6.1.2

  # PDF & Share
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^10.1.4

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Speech
  speech_to_text: ^7.0.0

  # Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2

  # Connectivity
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
